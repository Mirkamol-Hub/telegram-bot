<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Learning Center ERP</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ── Design tokens ─────────────────────────────────── */
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --card:     #22263a;
    --border:   #2e3352;
    --accent:   #4f7ef8;
    --accent2:  #7c5cbf;
    --green:    #2ecc71;
    --red:      #e74c3c;
    --amber:    #f39c12;
    --text:     #e8eaf0;
    --muted:    #7a80a0;
    --radius:   14px;
    --nav-h:    64px;
    --font:     'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ────────────────────────────────────────── */
  .header {
    padding: 16px 20px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .role-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .role-admin   { background: rgba(79,126,248,.2); color: var(--accent); }
  .role-teacher { background: rgba(124,92,191,.2); color: var(--accent2); }
  .role-student { background: rgba(46,204,113,.2); color: var(--green); }

  /* ── Main scrollable content ───────────────────────── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Bottom nav ────────────────────────────────────── */
  .bottom-nav {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--border);
    height: var(--nav-h);
    flex-shrink: 0;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 0;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item.active::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 2px;
    background: var(--accent);
    border-radius: 0 0 4px 4px;
  }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

  /* ── Cards ─────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .12s, border-color .12s;
    animation: fadeUp .25s ease both;
  }
  .card:active { transform: scale(.97); }
  .card:hover  { border-color: var(--accent); }
  .card-title  { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .card-meta   { display: flex; gap: 12px; flex-wrap: wrap; }
  .chip {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(79,126,248,.12);
    color: var(--accent);
    font-weight: 500;
  }
  .chip.green  { background: rgba(46,204,113,.12); color: var(--green); }
  .chip.purple { background: rgba(124,92,191,.12); color: var(--accent2); }
  .chip.amber  { background: rgba(243,156,18,.12);  color: var(--amber); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Section header ─────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .back-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    flex-shrink: 0;
  }
  .section-title { font-size: 18px; font-weight: 700; }

  /* ── Attendance ─────────────────────────────────────── */
  .student-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    animation: fadeUp .2s ease both;
  }
  .student-name { font-size: 15px; font-weight: 500; }
  .toggle-group { display: flex; gap: 8px; }
  .toggle-btn {
    border: none; border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .toggle-present { background: rgba(46,204,113,.15); color: var(--green); }
  .toggle-absent  { background: rgba(231,76,60,.15);  color: var(--red); }
  .toggle-present.active { background: var(--green); color: #fff; }
  .toggle-absent.active  { background: var(--red);   color: #fff; }

  /* ── Forms ──────────────────────────────────────────── */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  input, select, textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: var(--font);
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: none; min-height: 110px; }

  /* ── Buttons ─────────────────────────────────────────── */
  .btn {
    width: 100%; padding: 15px;
    border: none; border-radius: var(--radius);
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all .15s;
    letter-spacing: 0.2px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:active { opacity: .85; transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Expense list ───────────────────────────────────── */
  .expense-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .expense-left { flex: 1; }
  .expense-cat  { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .expense-desc { font-size: 14px; font-weight: 500; margin-top: 2px; }
  .expense-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .expense-amount { font-size: 17px; font-weight: 700; color: var(--amber); }

  /* ── Toast ──────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1e2235; border: 1px solid var(--border);
    color: var(--text); padding: 11px 20px;
    border-radius: 24px; font-size: 14px; font-weight: 500;
    z-index: 999; opacity: 0; pointer-events: none;
    transition: opacity .2s; white-space: nowrap;
    max-width: 88vw; text-align: center;
  }
  #toast.show { opacity: 1; }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error   { border-color: var(--red);   color: var(--red); }

  /* ── Loader ─────────────────────────────────────────── */
  .loader {
    display: flex; align-items: center; justify-content: center;
    padding: 48px 0; color: var(--muted); font-size: 15px; gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Delivery report ─────────────────────────────────── */
  .delivery-report {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 16px;
  }
  .delivery-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .delivery-item  { font-size: 13px; padding: 4px 0; color: var(--muted); }
  .delivery-item.ok   { color: var(--green); }
  .delivery-item.fail { color: var(--red); }

  /* ── Empty state ─────────────────────────────────────── */
  .empty {
    text-align: center; padding: 48px 0;
    color: var(--muted); font-size: 15px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Tabs (Expense tabs) ─────────────────────────────── */
  .tab-bar {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .tab {
    flex: 1; padding: 9px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s; text-align: center;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Submit bar for attendance ───────────────────────── */
  .submit-bar {
    position: sticky; bottom: 0;
    padding-top: 12px;
  }
  .attend-stats {
    display: flex; gap: 12px; margin-bottom: 10px;
  }
  .stat-chip {
    flex: 1; text-align: center; padding: 10px;
    border-radius: 10px; font-size: 14px; font-weight: 700;
  }
  .stat-chip.p { background: rgba(46,204,113,.12); color: var(--green); }
  .stat-chip.a { background: rgba(231,76,60,.12);  color: var(--red); }

  /* ── Homework history ────────────────────────────────── */
  .hw-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .hw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hw-group  { font-size: 13px; font-weight: 700; color: var(--accent); }
  .hw-date   { font-size: 11px; color: var(--muted); }
  .hw-text   { font-size: 14px; line-height: 1.5; color: var(--text); }
  .hw-by     { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <span class="app-title">📚 ERP Center</span>
    <span class="role-badge" id="role-badge">...</span>
  </div>
</div>

<!-- Content area -->
<div class="main" id="main-content">
  <div class="loader"><div class="spinner"></div>Loading...</div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="navigate('groups')" id="nav-groups">
    <span class="nav-icon">👥</span>
    <span class="nav-label">Groups</span>
  </button>
  <button class="nav-item" onclick="navigate('attendance')" id="nav-attendance">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Attendance</span>
  </button>
  <button class="nav-item" onclick="navigate('homeworks')" id="nav-homeworks">
    <span class="nav-icon">📝</span>
    <span class="nav-label">Homeworks</span>
  </button>
  <button class="nav-item" onclick="navigate('expenses')" id="nav-expenses">
    <span class="nav-icon">💰</span>
    <span class="nav-label">Expenses</span>
  </button>
</nav>

<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const API_BASE = window.location.origin + '/api';
const tg = window.Telegram?.WebApp;
let currentUser = null;
let currentTab = 'groups';

// ── Init ────────────────────────────────────────────────────────────────────
(async function init() {
  if (tg) {
    tg.ready();
    tg.expand();
  }
  await fetchUser();
  navigate('groups');
})();

// ── Auth ─────────────────────────────────────────────────────────────────────
async function fetchUser() {
  try {
    const data = await api('GET', '/auth/verify');
    currentUser = data.user;
    const badge = document.getElementById('role-badge');
    badge.textContent = currentUser.role;
    badge.className = `role-badge role-${currentUser.role}`;
    // Hide expenses nav for non-admins
    if (currentUser.role !== 'admin') {
      document.getElementById('nav-expenses').style.display = 'none';
    }
  } catch {
    currentUser = { role: 'student', first_name: 'User' };
    document.getElementById('role-badge').textContent = 'student';
    document.getElementById('role-badge').className = 'role-badge role-student';
  }
}

// ── API helper ────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (tg?.initData) {
    headers['X-Telegram-Init-Data'] = tg.initData;
  } else {
    // Dev fallback
    headers['X-Telegram-ID'] = '12345678';
  }
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(API_BASE + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: 'Unknown error' }));
    throw new Error(err.detail || 'Request failed');
  }
  return resp.json();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${tab}`);
  if (navEl) navEl.classList.add('active');
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loader"><div class="spinner"></div>Loading...</div>';

  const views = {
    groups:     showGroups,
    attendance: showAttendance,
    homeworks:  showHomeworks,
    expenses:   showExpenses,
  };
  views[tab]?.();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => el.className = '', 2500);
}

// ══════════════════════════════════════════════════════════════════════════════
// GROUPS MODULE
// ══════════════════════════════════════════════════════════════════════════════
async function showGroups(selectedGroup = null) {
  const main = document.getElementById('main-content');
  try {
    const data = await api('GET', '/groups/');
    const groups = data.groups;

    if (selectedGroup) {
      // Student list view
      const studData = await api('GET', `/groups/${encodeURIComponent(selectedGroup)}/students`);
      const students = studData.students;
      main.innerHTML = `
        <div class="section-header">
          <button class="back-btn" onclick="showGroups()">←</button>
          <span class="section-title">${selectedGroup}</span>
        </div>
        <div style="margin-bottom:12px;">
          <span class="chip">${students.length} students</span>
        </div>
        ${students.length === 0
          ? '<div class="empty"><div class="empty-icon">👤</div>No students yet</div>'
          : students.map((s, i) => `
            <div class="student-row" style="animation-delay:${i*0.04}s">
              <div>
                <div class="student-name">${s.Name}</div>
                <div style="font-size:12px;color:var(--muted);">${s.Phone || ''} · ID: ${s.Student_ID}</div>
              </div>
              <span class="chip green" style="font-size:11px;">${s.Join_Date || ''}</span>
            </div>`).join('')}
      `;
      return;
    }

    // Group list view
    const canCreate = currentUser?.role === 'admin';
    main.innerHTML = `
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Groups</div>
        <div style="color:var(--muted);font-size:14px;">${groups.length} active group${groups.length !== 1 ? 's' : ''}</div>
      </div>
      ${canCreate ? `
        <div style="margin-bottom:16px;">
          <button class="btn btn-primary" onclick="showCreateGroup()">+ New Group</button>
        </div>` : ''}
      ${groups.length === 0
        ? '<div class="empty"><div class="empty-icon">👥</div>No groups created yet</div>'
        : groups.map((g, i) => `
          <div class="card" style="animation-delay:${i*0.05}s" onclick="showGroups('${g.Group_Name}')">
            <div class="card-title">${g.Group_Name}</div>
            <div class="card-meta">
              <span class="chip purple">👩‍🏫 ${g.Teacher}</span>
              <span class="chip green">👥 ${g.Student_Count} students</span>
              <span class="chip">ID: ${g.Group_ID}</span>
            </div>
          </div>`).join('')}
    `;
  } catch (e) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
}

async function showCreateGroup() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-header">
      <button class="back-btn" onclick="showGroups()">←</button>
      <span class="section-title">New Group</span>
    </div>
    <div class="form-group">
      <label>Group Name</label>
      <input id="gname" placeholder="e.g. English A1 Morning" />
    </div>
    <div class="form-group">
      <label>Teacher</label>
      <input id="gteacher" placeholder="Teacher's full name" />
    </div>
    <div style="margin-top:8px;">
      <button class="btn btn-primary" onclick="createGroup()">Create Group</button>
    </div>
  `;
}

async function createGroup() {
  const name = document.getElementById('gname').value.trim();
  const teacher = document.getElementById('gteacher').value.trim();
  if (!name || !teacher) { toast('Fill all fields', 'error'); return; }
  try {
    await api('POST', '/groups/', { group_name: name, teacher });
    toast('Group created ✅', 'success');
    showGroups();
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// ATTENDANCE MODULE
// ══════════════════════════════════════════════════════════════════════════════
let attendanceData = {};  // {studentId: 'Present'|'Absent'}

async function showAttendance(selectedGroup = null) {
  const main = document.getElementById('main-content');
  if (currentUser?.role === 'student') {
    main.innerHTML = '<div class="empty"><div class="empty-icon">🔒</div>Attendance is managed by your teacher.</div>';
    return;
  }
  try {
    const data = await api('GET', '/groups/');
    const groups = data.groups;

    if (selectedGroup) {
      // Mark attendance
      const studData = await api('GET', `/groups/${encodeURIComponent(selectedGroup)}/students`);
      const students = studData.students;
      attendanceData = {};
      students.forEach(s => attendanceData[s.Student_ID] = 'Present');

      const today = new Date().toISOString().split('T')[0];

      main.innerHTML = `
        <div class="section-header">
          <button class="back-btn" onclick="showAttendance()">←</button>
          <span class="section-title">${selectedGroup}</span>
        </div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:14px;">📅 ${today}</div>
        ${students.length === 0
          ? '<div class="empty"><div class="empty-icon">👤</div>No students in this group</div>'
          : `<div id="student-list">
            ${students.map((s, i) => `
              <div class="student-row" style="animation-delay:${i*0.04}s">
                <div class="student-name">${s.Name}</div>
                <div class="toggle-group">
                  <button class="toggle-btn toggle-present active" id="p-${s.Student_ID}"
                    onclick="setStatus('${s.Student_ID}', '${s.Name}', 'Present')">✓</button>
                  <button class="toggle-btn toggle-absent" id="a-${s.Student_ID}"
                    onclick="setStatus('${s.Student_ID}', '${s.Name}', 'Absent')">✗</button>
                </div>
              </div>`).join('')}
          </div>
          <div class="submit-bar">
            <div class="attend-stats">
              <div class="stat-chip p" id="count-p">✓ ${students.length} Present</div>
              <div class="stat-chip a" id="count-a">✗ 0 Absent</div>
            </div>
            <button class="btn btn-primary" onclick="submitAttendance('${selectedGroup}', ${JSON.stringify(students).replace(/"/g,'&quot;')})">
              Submit Attendance
            </button>
          </div>`}
      `;
      return;
    }

    main.innerHTML = `
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Attendance</div>
        <div style="color:var(--muted);font-size:14px;">Select a group to mark</div>
      </div>
      ${groups.map((g, i) => `
        <div class="card" style="animation-delay:${i*0.05}s" onclick="showAttendance('${g.Group_Name}')">
          <div class="card-title">${g.Group_Name}</div>
          <div class="card-meta">
            <span class="chip purple">${g.Teacher}</span>
            <span class="chip green">${g.Student_Count} students</span>
          </div>
        </div>`).join('')}
    `;
  } catch (e) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
}

function setStatus(studentId, name, status) {
  attendanceData[studentId] = status;
  const pBtn = document.getElementById(`p-${studentId}`);
  const aBtn = document.getElementById(`a-${studentId}`);
  if (status === 'Present') {
    pBtn.classList.add('active'); aBtn.classList.remove('active');
  } else {
    aBtn.classList.add('active'); pBtn.classList.remove('active');
  }
  // Update counts
  const present = Object.values(attendanceData).filter(v => v === 'Present').length;
  const absent  = Object.values(attendanceData).filter(v => v === 'Absent').length;
  document.getElementById('count-p').textContent = `✓ ${present} Present`;
  document.getElementById('count-a').textContent = `✗ ${absent} Absent`;
}

async function submitAttendance(group, students) {
  const attendance = students.map(s => ({
    student_id:   s.Student_ID,
    student_name: s.Name,
    status:       attendanceData[s.Student_ID] || 'Absent',
  }));
  try {
    const res = await api('POST', '/attendance/', { group, attendance });
    toast(res.message, 'success');
    setTimeout(() => showAttendance(), 1200);
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// HOMEWORKS MODULE
// ══════════════════════════════════════════════════════════════════════════════
async function showHomeworks(selectedGroup = null, showHistory = false) {
  const main = document.getElementById('main-content');
  if (currentUser?.role === 'student') {
    main.innerHTML = '<div class="empty"><div class="empty-icon">📝</div>Homework will be sent to you via Telegram messages.</div>';
    return;
  }
  try {
    const groupsData = await api('GET', '/groups/');
    const groups = groupsData.groups;

    if (selectedGroup) {
      main.innerHTML = `
        <div class="section-header">
          <button class="back-btn" onclick="showHomeworks()">←</button>
          <span class="section-title">Send Homework</span>
        </div>
        <div style="margin-bottom:14px;">
          <span class="chip purple">👥 ${selectedGroup}</span>
        </div>
        <div class="form-group">
          <label>Homework Text</label>
          <textarea id="hw-text" placeholder="Write the homework assignment here..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="sendHomework('${selectedGroup}')">
          📤 Send to All Students
        </button>
        <div id="delivery-result"></div>
      `;
      return;
    }

    const hwData = await api('GET', '/homeworks/');
    const homeworks = hwData.homeworks.slice().reverse();

    main.innerHTML = `
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Homeworks</div>
        <div style="color:var(--muted);font-size:14px;">Select a group to send homework</div>
      </div>
      <div class="tab-bar">
        <div class="tab active" onclick="showHomeworks()" id="tab-send">Send New</div>
        <div class="tab" onclick="showHwHistory()" id="tab-hist">History (${homeworks.length})</div>
      </div>
      ${groups.map((g, i) => `
        <div class="card" style="animation-delay:${i*0.05}s" onclick="showHomeworks('${g.Group_Name}')">
          <div class="card-title">${g.Group_Name}</div>
          <div class="card-meta">
            <span class="chip purple">${g.Teacher}</span>
            <span class="chip green">${g.Student_Count} students</span>
          </div>
        </div>`).join('')}
    `;
  } catch (e) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
}

async function showHwHistory() {
  const main = document.getElementById('main-content');
  try {
    const hwData = await api('GET', '/homeworks/');
    const homeworks = hwData.homeworks.slice().reverse();
    main.innerHTML = `
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Homework History</div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="showHomeworks()">← Back</button>
      </div>
      ${homeworks.length === 0
        ? '<div class="empty"><div class="empty-icon">📭</div>No homework sent yet</div>'
        : homeworks.map((h, i) => `
          <div class="hw-item" style="animation-delay:${i*0.04}s">
            <div class="hw-header">
              <span class="hw-group">👥 ${h.Group}</span>
              <span class="hw-date">${h.Date}</span>
            </div>
            <div class="hw-text">${h.Homework_Text}</div>
            <div class="hw-by">Sent by ${h.Sent_By}</div>
          </div>`).join('')}
    `;
  } catch (e) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
}

async function sendHomework(group) {
  const text = document.getElementById('hw-text').value.trim();
  if (!text) { toast('Write homework first', 'error'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const res = await api('POST', '/homeworks/send', { group, homework_text: text });
    const d = res.delivery;
    document.getElementById('delivery-result').innerHTML = `
      <div class="delivery-report">
        <div class="delivery-title">📊 Delivery Report</div>
        <div style="margin-bottom:8px;">
          <span class="chip green">✓ ${d.sent.length} sent</span>
          ${d.failed.length > 0 ? `<span class="chip" style="background:rgba(231,76,60,.12);color:var(--red);margin-left:8px;">✗ ${d.failed.length} failed</span>` : ''}
        </div>
        ${d.sent.map(n => `<div class="delivery-item ok">✓ ${n}</div>`).join('')}
        ${d.failed.map(f => `<div class="delivery-item fail">✗ ${f.name} — ${f.reason}</div>`).join('')}
      </div>
    `;
    toast('Homework sent!', 'success');
    btn.textContent = '✓ Sent';
  } catch (e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = '📤 Send to All Students';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// EXPENSES MODULE
// ══════════════════════════════════════════════════════════════════════════════
async function showExpenses(tab = 'add') {
  const main = document.getElementById('main-content');
  if (currentUser?.role !== 'admin') {
    main.innerHTML = '<div class="empty"><div class="empty-icon">🔒</div>Expenses are visible to admins only.</div>';
    return;
  }

  let expData = { expenses: [], total: 0 };
  try { expData = await api('GET', '/expenses/'); } catch {}

  const expenses = expData.expenses.slice().reverse();
  const cats = { rent: '🏢', salary: '💼', utilities: '⚡', materials: '📦', other: '📌' };

  main.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Expenses</div>
      <div style="color:var(--muted);font-size:14px;">Total: <strong style="color:var(--amber);">${Number(expData.total).toLocaleString()} sum</strong></div>
    </div>
    <div class="tab-bar">
      <div class="tab ${tab==='add'?'active':''}" onclick="showExpenses('add')">Add New</div>
      <div class="tab ${tab==='list'?'active':''}" onclick="showExpenses('list')">History (${expenses.length})</div>
    </div>
    ${tab === 'add' ? `
      <div class="form-group">
        <label>Category</label>
        <select id="exp-cat">
          <option value="rent">🏢 Rent</option>
          <option value="salary">💼 Salary</option>
          <option value="utilities">⚡ Utilities</option>
          <option value="materials">📦 Materials</option>
          <option value="other">📌 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (sum)</label>
        <input id="exp-amount" type="number" placeholder="e.g. 500000" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input id="exp-desc" placeholder="Brief description" />
      </div>
      <button class="btn btn-primary" onclick="addExpense()">💾 Save Expense</button>
    ` : `
      ${expenses.length === 0
        ? '<div class="empty"><div class="empty-icon">💸</div>No expenses yet</div>'
        : expenses.map((e, i) => `
          <div class="expense-row" style="animation-delay:${i*0.04}s">
            <div class="expense-left">
              <div class="expense-cat">${cats[e.Category] || '📌'} ${e.Category}</div>
              <div class="expense-desc">${e.Description}</div>
              <div class="expense-date">${e.Date}</div>
            </div>
            <div class="expense-amount">${Number(e.Amount).toLocaleString()}</div>
          </div>`).join('')}
    `}
  `;
}

async function addExpense() {
  const category    = document.getElementById('exp-cat').value;
  const amount      = parseFloat(document.getElementById('exp-amount').value);
  const description = document.getElementById('exp-desc').value.trim();
  if (!amount || !description) { toast('Fill all fields', 'error'); return; }
  if (amount <= 0) { toast('Amount must be positive', 'error'); return; }
  try {
    await api('POST', '/expenses/', { category, amount, description });
    toast('Expense saved ✅', 'success');
    showExpenses('list');
  } catch (e) {
    toast(e.message, 'error');
  }
}
</script>
